<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1510" viewBox="0 0 2200 1510">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F4ED"/>
      <stop offset="1" stop-color="#EAF2EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#173E35" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 800 40px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #183B33; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #61736D; }
      .table-title { font: 800 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .table-caption { font: 500 14px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #D9ECE6; }
      .field { font: 500 16px Menlo, Consolas, monospace; fill: #273B35; }
      .field-muted { font: 500 15px Menlo, Consolas, monospace; fill: #6C7B76; }
      .badge { font: 800 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .relation { fill: none; stroke: #2F7463; stroke-width: 3; }
      .relation-one { font: 800 17px Menlo, Consolas, monospace; fill: #215B4D; }
      .relation-many { font: 800 17px Menlo, Consolas, monospace; fill: #B95F35; }
      .relation-label { font: 700 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #355E53; }
      .cascade { font: 600 13px Menlo, Consolas, monospace; fill: #74827D; }
      .legend { font: 600 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #40544E; }
    </style>
  </defs>

  <rect width="2200" height="1510" fill="url(#background)"/>
  <circle cx="2030" cy="95" r="190" fill="#D7E8E1" opacity="0.5"/>
  <circle cx="115" cy="1420" r="245" fill="#F1DCCF" opacity="0.48"/>

  <text x="70" y="70" class="title">College Tracker 后端数据库 E-R 关系图</text>
  <text x="72" y="105" class="subtitle">SQLite · 6 张核心表 · 所有业务数据通过 user_id 隔离</text>

  <!-- relationships are drawn behind table cards -->
  <path class="relation" d="M 1110 285 C 1170 285, 1180 285, 1240 285"/>
  <text x="1124" y="272" class="relation-one">1</text>
  <text x="1193" y="272" class="relation-one">0..1</text>
  <text x="1152" y="310" class="relation-label">简历资料</text>

  <path class="relation" d="M 760 460 C 760 590, 305 590, 305 735"/>
  <text x="742" y="494" class="relation-one">1</text>
  <text x="272" y="720" class="relation-many">0..N</text>
  <text x="391" y="578" class="relation-label">修读课程</text>
  <text x="389" y="600" class="cascade">users.id → courses.user_id</text>

  <path class="relation" d="M 830 460 C 830 605, 810 605, 810 735"/>
  <text x="812" y="494" class="relation-one">1</text>
  <text x="777" y="720" class="relation-many">0..N</text>
  <text x="833" y="585" class="relation-label">教育经历</text>
  <text x="833" y="607" class="cascade">ON DELETE CASCADE</text>

  <path class="relation" d="M 900 460 C 900 590, 1330 590, 1330 735"/>
  <text x="882" y="494" class="relation-one">1</text>
  <text x="1297" y="720" class="relation-many">0..N</text>
  <text x="1068" y="578" class="relation-label">实践与活动</text>
  <text x="1064" y="600" class="cascade">users.id → experiences.user_id</text>

  <path class="relation" d="M 970 460 C 970 565, 1855 565, 1855 735"/>
  <text x="952" y="494" class="relation-one">1</text>
  <text x="1822" y="720" class="relation-many">0..N</text>
  <text x="1492" y="553" class="relation-label">获得荣誉</text>
  <text x="1488" y="575" class="cascade">users.id → awards.user_id</text>

  <!-- users -->
  <g filter="url(#shadow)">
    <rect x="600" y="145" width="510" height="315" rx="18" fill="#FFFEFA" stroke="#B7CCC4" stroke-width="2"/>
    <path d="M 618 145 H 1092 Q 1110 145 1110 163 V 215 H 600 V 163 Q 600 145 618 145 Z" fill="#1F6B5B"/>
  </g>
  <text x="630" y="182" class="table-title">users</text>
  <text x="630" y="205" class="table-caption">用户账户与主身份信息 · 中心父表</text>
  <rect x="630" y="237" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="638" y="253" class="badge">PK</text>
  <text x="680" y="253" class="field">id  INTEGER AUTOINCREMENT</text>
  <rect x="630" y="270" width="45" height="21" rx="5" fill="#7759A6"/>
  <text x="637" y="286" class="badge">UK</text>
  <text x="688" y="286" class="field">username  TEXT NOT NULL</text>
  <text x="630" y="319" class="field">password  TEXT NOT NULL</text>
  <text x="630" y="349" class="field">password_salt  TEXT</text>
  <text x="630" y="379" class="field">grade / gender  TEXT</text>
  <text x="630" y="409" class="field">major / school  TEXT</text>
  <text x="630" y="439" class="field-muted">被所有业务表的 user_id 引用</text>

  <!-- resume_profiles -->
  <g filter="url(#shadow)">
    <rect x="1240" y="125" width="660" height="510" rx="18" fill="#FFFEFA" stroke="#B7CCC4" stroke-width="2"/>
    <path d="M 1258 125 H 1882 Q 1900 125 1900 143 V 195 H 1240 V 143 Q 1240 125 1258 125 Z" fill="#315F78"/>
  </g>
  <text x="1270" y="162" class="table-title">resume_profiles</text>
  <text x="1270" y="185" class="table-caption">每名用户最多一份简历配置</text>
  <rect x="1270" y="217" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="1278" y="233" class="badge">PK</text>
  <text x="1320" y="233" class="field">id  INTEGER AUTOINCREMENT</text>
  <rect x="1270" y="250" width="78" height="21" rx="5" fill="#2F8A70"/>
  <text x="1277" y="266" class="badge">FK + UK</text>
  <text x="1362" y="266" class="field">user_id → users.id</text>
  <text x="1270" y="299" class="field">full_name / phone / email  TEXT</text>
  <text x="1270" y="329" class="field">job_target  TEXT</text>
  <text x="1270" y="359" class="field">github_url / website_url  TEXT</text>
  <text x="1270" y="389" class="field">summary / skills  TEXT</text>
  <text x="1270" y="419" class="field">photo_path  TEXT</text>
  <text x="1270" y="449" class="field">template_id  TEXT DEFAULT 'classic'</text>
  <text x="1270" y="479" class="field">created_at / updated_at  TEXT</text>
  <line x1="1270" y1="501" x2="1870" y2="501" stroke="#D9E2DE"/>
  <text x="1270" y="530" class="field-muted">UNIQUE(user_id) 形成 users 1 : 0..1 关系</text>
  <text x="1270" y="558" class="field-muted">保存简历基本资料、照片路径及模板 ID</text>
  <text x="1270" y="588" class="field-muted">删除用户时级联删除</text>

  <!-- courses -->
  <g filter="url(#shadow)">
    <rect x="60" y="735" width="490" height="470" rx="18" fill="#FFFEFA" stroke="#DCC9B8" stroke-width="2"/>
    <path d="M 78 735 H 532 Q 550 735 550 753 V 805 H 60 V 753 Q 60 735 78 735 Z" fill="#B8673E"/>
  </g>
  <text x="90" y="772" class="table-title">courses</text>
  <text x="90" y="795" class="table-caption">课程、成绩、学分与 GPA</text>
  <rect x="90" y="827" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="98" y="843" class="badge">PK</text>
  <text x="140" y="843" class="field">id  INTEGER</text>
  <rect x="90" y="860" width="36" height="21" rx="5" fill="#2F8A70"/>
  <text x="98" y="876" class="badge">FK</text>
  <text x="140" y="876" class="field">user_id → users.id</text>
  <text x="90" y="909" class="field">name  TEXT NOT NULL</text>
  <text x="90" y="939" class="field">credit / score / gpa  REAL</text>
  <text x="90" y="969" class="field">semester  TEXT</text>
  <text x="90" y="999" class="field">semester_order  INTEGER</text>
  <text x="90" y="1029" class="field">is_core  INTEGER CHECK(0,1)</text>
  <line x1="90" y1="1052" x2="520" y2="1052" stroke="#E6D9CE"/>
  <text x="90" y="1082" class="field-muted">一个用户可拥有 0..N 门课程</text>
  <text x="90" y="1112" class="field-muted">核心课程可复用于简历生成</text>
  <text x="90" y="1142" class="field-muted">索引：user_id + is_core + semester_order</text>
  <text x="90" y="1172" class="field-muted">ON DELETE CASCADE</text>

  <!-- education_records -->
  <g filter="url(#shadow)">
    <rect x="575" y="735" width="490" height="500" rx="18" fill="#FFFEFA" stroke="#C5C8DC" stroke-width="2"/>
    <path d="M 593 735 H 1047 Q 1065 735 1065 753 V 805 H 575 V 753 Q 575 735 593 735 Z" fill="#5B638B"/>
  </g>
  <text x="605" y="772" class="table-title">education_records</text>
  <text x="605" y="795" class="table-caption">支持多段教育背景</text>
  <rect x="605" y="827" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="613" y="843" class="badge">PK</text>
  <text x="655" y="843" class="field">id  INTEGER</text>
  <rect x="605" y="860" width="36" height="21" rx="5" fill="#2F8A70"/>
  <text x="613" y="876" class="badge">FK</text>
  <text x="655" y="876" class="field">user_id → users.id</text>
  <text x="605" y="909" class="field">school  TEXT NOT NULL</text>
  <text x="605" y="939" class="field">major / degree  TEXT</text>
  <text x="605" y="969" class="field">start_date / end_date  TEXT</text>
  <text x="605" y="999" class="field">description  TEXT</text>
  <text x="605" y="1029" class="field">sort_order  INTEGER</text>
  <text x="605" y="1059" class="field">is_visible  INTEGER CHECK(0,1)</text>
  <line x1="605" y1="1082" x2="1035" y2="1082" stroke="#DCDDE8"/>
  <text x="605" y="1112" class="field-muted">一个用户可拥有 0..N 条教育经历</text>
  <text x="605" y="1142" class="field-muted">按 sort_order 控制简历展示顺序</text>
  <text x="605" y="1172" class="field-muted">索引：user_id + sort_order + id</text>
  <text x="605" y="1202" class="field-muted">ON DELETE CASCADE</text>

  <!-- experiences -->
  <g filter="url(#shadow)">
    <rect x="1090" y="735" width="500" height="530" rx="18" fill="#FFFEFA" stroke="#B7D2C7" stroke-width="2"/>
    <path d="M 1108 735 H 1572 Q 1590 735 1590 753 V 805 H 1090 V 753 Q 1090 735 1108 735 Z" fill="#347965"/>
  </g>
  <text x="1120" y="772" class="table-title">experiences</text>
  <text x="1120" y="795" class="table-caption">实习、竞赛、项目与其他实践</text>
  <rect x="1120" y="827" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="1128" y="843" class="badge">PK</text>
  <text x="1170" y="843" class="field">id  INTEGER</text>
  <rect x="1120" y="860" width="36" height="21" rx="5" fill="#2F8A70"/>
  <text x="1128" y="876" class="badge">FK</text>
  <text x="1170" y="876" class="field">user_id → users.id</text>
  <text x="1120" y="909" class="field">title / type  TEXT NOT NULL</text>
  <text x="1120" y="939" class="field">date / content  TEXT</text>
  <text x="1120" y="969" class="field">organization / role  TEXT</text>
  <text x="1120" y="999" class="field">sort_order  INTEGER</text>
  <text x="1120" y="1029" class="field">is_visible  INTEGER CHECK(0,1)</text>
  <line x1="1120" y1="1052" x2="1560" y2="1052" stroke="#D8E7E1"/>
  <text x="1120" y="1082" class="field-muted">一个用户可拥有 0..N 条实践经历</text>
  <text x="1120" y="1112" class="field-muted">type：实习 / 竞赛 / 项目 / 其他</text>
  <text x="1120" y="1142" class="field-muted">organization、role 用于简历扩展</text>
  <text x="1120" y="1172" class="field-muted">索引：user_id + is_visible + sort_order</text>
  <text x="1120" y="1202" class="field-muted">ON DELETE CASCADE</text>

  <!-- awards -->
  <g filter="url(#shadow)">
    <rect x="1615" y="735" width="500" height="500" rx="18" fill="#FFFEFA" stroke="#E3C9C2" stroke-width="2"/>
    <path d="M 1633 735 H 2097 Q 2115 735 2115 753 V 805 H 1615 V 753 Q 1615 735 1633 735 Z" fill="#9A584E"/>
  </g>
  <text x="1645" y="772" class="table-title">awards</text>
  <text x="1645" y="795" class="table-caption">荣誉级别、时间与奖金</text>
  <rect x="1645" y="827" width="36" height="21" rx="5" fill="#D97745"/>
  <text x="1653" y="843" class="badge">PK</text>
  <text x="1695" y="843" class="field">id  INTEGER</text>
  <rect x="1645" y="860" width="36" height="21" rx="5" fill="#2F8A70"/>
  <text x="1653" y="876" class="badge">FK</text>
  <text x="1695" y="876" class="field">user_id → users.id</text>
  <text x="1645" y="909" class="field">name  TEXT NOT NULL</text>
  <text x="1645" y="939" class="field">level / date  TEXT</text>
  <text x="1645" y="969" class="field">amount  REAL</text>
  <text x="1645" y="999" class="field">description  TEXT</text>
  <text x="1645" y="1029" class="field">sort_order  INTEGER</text>
  <text x="1645" y="1059" class="field">is_visible  INTEGER CHECK(0,1)</text>
  <line x1="1645" y1="1082" x2="2085" y2="1082" stroke="#EADBD7"/>
  <text x="1645" y="1112" class="field-muted">一个用户可拥有 0..N 项荣誉</text>
  <text x="1645" y="1142" class="field-muted">description 用于简历补充说明</text>
  <text x="1645" y="1172" class="field-muted">索引：user_id + is_visible + sort_order</text>
  <text x="1645" y="1202" class="field-muted">ON DELETE CASCADE</text>

  <!-- legend and relationship summary -->
  <g>
    <rect x="60" y="1320" width="2055" height="135" rx="18" fill="#FFFFFF" opacity="0.88" stroke="#CAD9D3"/>
    <text x="90" y="1357" class="legend">图例：</text>
    <rect x="150" y="1339" width="36" height="21" rx="5" fill="#D97745"/>
    <text x="158" y="1355" class="badge">PK</text>
    <text x="198" y="1357" class="legend">主键</text>
    <rect x="270" y="1339" width="36" height="21" rx="5" fill="#2F8A70"/>
    <text x="278" y="1355" class="badge">FK</text>
    <text x="318" y="1357" class="legend">外键</text>
    <rect x="390" y="1339" width="45" height="21" rx="5" fill="#7759A6"/>
    <text x="397" y="1355" class="badge">UK</text>
    <text x="447" y="1357" class="legend">唯一约束</text>
    <text x="560" y="1357" class="legend">1：一个父记录</text>
    <text x="720" y="1357" class="legend">0..1：零或一个子记录</text>
    <text x="955" y="1357" class="legend">0..N：零到多个子记录</text>
    <text x="90" y="1397" class="legend">关系汇总：</text>
    <text x="190" y="1397" class="legend">users 1—0..1 resume_profiles</text>
    <text x="520" y="1397" class="legend">users 1—0..N courses</text>
    <text x="790" y="1397" class="legend">users 1—0..N education_records</text>
    <text x="1185" y="1397" class="legend">users 1—0..N experiences</text>
    <text x="1530" y="1397" class="legend">users 1—0..N awards</text>
    <text x="90" y="1430" class="cascade">所有外键均引用 users(id)，并使用 ON DELETE CASCADE：删除用户时，其课程、教育经历、实践经历、荣誉和简历资料会一并删除。</text>
  </g>
</svg>
