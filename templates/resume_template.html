<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DOCUMENT_TITLE}}</title>
<style>
    @page {
        size: A4;
        margin: 14mm 15mm;
    }
    * {
        box-sizing: border-box;
    }
    body {
        font-family: "Times New Roman", SimSun, "Songti SC", serif;
        line-height: 1.6;
        color: #333;
        margin: 0;
        padding: 30px;
        background-color: #f1f3f5;
    }
    .resume-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 30px;
        background: #fff;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    .header-left {
        flex: 1;
        min-width: 0;
    }
    .header-left h1 {
        font-size: 28px;
        margin: 0 0 10px 0;
        font-family: "SimHei", "Heiti SC", sans-serif;
        font-weight: normal;
    }
    .contact-info {
        font-size: 14px;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        line-height: 1.8;
        overflow-wrap: anywhere;
    }
    .contact-line:empty {
        display: none;
    }
    .separator {
        margin: 0 8px;
        color: #777;
    }
    .header-right {
        margin-left: 20px;
    }
    .profile-photo {
        width: 90px;
        height: 120px;
        object-fit: cover;
        border: 1px solid #ddd;
        padding: 2px;
        background-color: #fff;
    }
    section {
        margin-bottom: 20px;
    }
    .section-title {
        font-size: 16px;
        font-weight: bold;
        font-family: "SimHei", "Heiti SC", sans-serif;
        border-bottom: 1px solid #333;
        margin-bottom: 12px;
        padding-bottom: 3px;
        text-align: left;
    }
    .item {
        margin-bottom: 12px;
        break-inside: avoid;
        page-break-inside: avoid;
    }
    .item-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 18px;
        margin-bottom: 4px;
    }
    .item-title {
        font-size: 15px;
        min-width: 0;
    }
    .item-date {
        flex: 0 0 auto;
        font-size: 14px;
        font-family: Arial, sans-serif;
        white-space: nowrap;
    }
    .item-desc {
        font-size: 14.5px;
        text-align: justify;
        white-space: normal;
    }
    .academic-summary {
        margin-top: 8px;
    }
    strong {
        font-family: "SimHei", "Heiti SC", sans-serif;
        font-weight: bold;
    }
    i {
        font-style: italic;
    }
    ul {
        margin: 5px 0 0 0;
        padding-left: 20px;
        font-size: 14.5px;
    }
    li {
        margin-bottom: 4px;
        text-align: justify;
    }
    a {
        color: #333;
        text-decoration: none;
    }
    .empty-resume {
        padding: 20px 0;
        color: #777;
        text-align: center;
    }
    @media print {
        body {
            padding: 0;
            background: #fff;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .resume-container {
            max-width: none;
            padding: 0;
            box-shadow: none;
        }
        header, .item, li {
            break-inside: avoid;
            page-break-inside: avoid;
        }
        a {
            color: #333;
        }
    }
</style>
</head>
<body>
<div class="resume-container">
    <header>
        <div class="header-left">
            <h1>{{FULL_NAME}}</h1>
            <div class="contact-info">{{CONTACT_INFO}}</div>
        </div>
        {{PHOTO_BLOCK}}
    </header>

    {{SUMMARY_SECTION}}
    {{EDUCATION_SECTION}}
    {{SKILLS_SECTION}}
    {{INTERNSHIP_SECTION}}
    {{PROJECT_AWARD_SECTION}}
    {{OTHER_SECTION}}
    {{EMPTY_MESSAGE}}
</div>
</body>
</html>
