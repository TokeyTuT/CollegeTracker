<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DOCUMENT_TITLE}}</title>
<style>
    :root {
        --paper: #f7f3ec;
        --ink: #292723;
        --muted: #746e65;
        --rust: #a54d36;
        --rule: #bdb4a7;
    }
    @page {
        size: A4;
        margin: 0;
    }
    * {
        box-sizing: border-box;
    }
    body {
        margin: 0;
        padding: 30px;
        color: var(--ink);
        background: #dedbd5;
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
        line-height: 1.52;
    }
    .resume-container {
        position: relative;
        width: 794px;
        min-height: 1123px;
        margin: 0 auto;
        padding: 44px 60px 36px;
        overflow: hidden;
        background:
            linear-gradient(rgba(165,77,54,0.035) 1px, transparent 1px),
            var(--paper);
        background-size: 100% 28px;
        box-shadow: 0 16px 44px rgba(48, 43, 35, 0.14);
    }
    .resume-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 9px;
        height: 100%;
        background: var(--rust);
    }
    header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 34px;
        align-items: start;
        margin-bottom: 24px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--ink);
    }
    .header-left {
        min-width: 0;
    }
    h1 {
        margin: 0 0 10px;
        font-family: "Baskerville", "Songti SC", serif;
        font-size: 38px;
        font-weight: 600;
        letter-spacing: 0.13em;
        line-height: 1.15;
    }
    .contact-info {
        max-width: 510px;
        color: var(--muted);
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        font-size: 11px;
        line-height: 1.75;
        overflow-wrap: anywhere;
    }
    .separator {
        margin: 0 8px;
        color: var(--rust);
    }
    .header-right {
        margin: 0;
    }
    .profile-photo {
        display: block;
        width: 84px;
        height: 112px;
        object-fit: cover;
        padding: 0;
        border: 0;
        filter: saturate(0.72) contrast(1.03);
        outline: 1px solid var(--rule);
        outline-offset: 5px;
    }
    .content {
        counter-reset: resume-section;
    }
    section {
        position: relative;
        margin: 0 0 16px;
        padding-left: 54px;
    }
    .section-title {
        position: relative;
        margin-bottom: 8px;
        color: var(--ink);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.12em;
    }
    .section-title::before {
        counter-increment: resume-section;
        content: "0" counter(resume-section);
        position: absolute;
        top: 1px;
        left: -54px;
        color: var(--rust);
        font-family: "Baskerville", "Times New Roman", serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
    }
    .section-title::after {
        content: "";
        display: block;
        width: 32px;
        height: 2px;
        margin-top: 6px;
        background: var(--rust);
    }
    .item {
        margin-bottom: 9px;
        break-inside: avoid;
        page-break-inside: avoid;
    }
    .item-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: baseline;
        margin-bottom: 2px;
    }
    .item-title {
        min-width: 0;
        font-size: 12.5px;
    }
    .item-title strong {
        font-weight: 700;
    }
    .item-title i {
        color: var(--muted);
    }
    .item-date {
        color: var(--rust);
        font-family: "Avenir Next", sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        white-space: nowrap;
    }
    .item-desc,
    ul {
        color: #58534c;
        font-size: 11.5px;
    }
    .item-desc {
        text-align: justify;
    }
    ul {
        margin: 3px 0 0;
        padding: 0;
        list-style: none;
    }
    li {
        position: relative;
        margin-bottom: 2px;
        padding-left: 15px;
        text-align: justify;
    }
    li::before {
        content: "—";
        position: absolute;
        left: 0;
        color: var(--rust);
    }
    .academic-summary {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--rule);
        color: var(--ink);
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        font-size: 10.5px;
    }
    a {
        color: inherit;
        text-decoration: none;
    }
    .empty-resume {
        padding: 50px 0;
        color: var(--muted);
        text-align: center;
    }
    @media print {
        body {
            padding: 0;
            background: #fff;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .resume-container {
            box-shadow: none;
        }
        .item, li {
            break-inside: avoid;
            page-break-inside: avoid;
        }
    }
</style>
</head>
<body>
<div class="resume-container">
    <header>
        <div class="header-left">
            <h1>{{FULL_NAME}}</h1>
            <div class="contact-info">{{CONTACT_INFO}}</div>
        </div>
        {{PHOTO_BLOCK}}
    </header>

    <main class="content">
        {{SUMMARY_SECTION}}
        {{EDUCATION_SECTION}}
        {{SKILLS_SECTION}}
        {{INTERNSHIP_SECTION}}
        {{PROJECT_AWARD_SECTION}}
        {{OTHER_SECTION}}
        {{EMPTY_MESSAGE}}
    </main>
</div>
</body>
</html>
